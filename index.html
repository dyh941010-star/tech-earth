<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Earth 400x400</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tech-earth {
      width: 400px;
      height: 400px;
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    canvas {
      width: 400px;
      height: 400px;
      display: block;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="tech-earth">
    <canvas id="globe" width="400" height="400"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("globe");
    const ctx = canvas.getContext("2d");

    const W = 400;
    const H = 400;
    const CX = 200;
    const CY = 255;
    const R = 128;

    let rotY = 0, rotX = 0;
    let targetRotY = 0, targetRotX = 0;
    let tick = 0;

    const points = [];
    const links = [];
    const outerLines = [];
    const rays = [];

    const POINT_COUNT = 1500;
    const OUTER_LINE_COUNT = 150;   // 增加散射线数量
    const RAY_COUNT = 140;          // 增加外围长射线数量

    function spherePoint() {
      const u = Math.random();
      const v = Math.random();
      const theta = u * Math.PI * 2;
      const phi = Math.acos(2 * v - 1);

      const x = R * Math.sin(phi) * Math.cos(theta);
      const y = R * Math.cos(phi);
      const z = R * Math.sin(phi) * Math.sin(theta);

      if (y > R * 0.42) return spherePoint();
      return { x, y, z };
    }

    for (let i = 0; i < POINT_COUNT; i++) points.push(spherePoint());

    for (let i = 0; i < points.length; i += 4) {
      links.push([
        points[i],
        points[(i + Math.floor(Math.random() * 18) + 1) % points.length]
      ]);
    }

    for (let i = 0; i < OUTER_LINE_COUNT; i++) {
      const angle = Math.PI + (i / OUTER_LINE_COUNT) * Math.PI;
      outerLines.push({
        x: Math.cos(angle) * (R * 0.82),
        y: Math.sin(angle) * (R * 0.82),
        z: (Math.random() - 0.5) * 55,
        len: 35 + Math.random() * 80,   // 拉长散射线
        spread: (Math.random() - 0.5) * 0.9,
        alpha: 0.12 + Math.random() * 0.32
      });
    }

    for (let i = 0; i < RAY_COUNT; i++) {
      const angle = Math.PI + Math.random() * Math.PI;
      rays.push({
        angle,
        radius: R * (0.68 + Math.random() * 0.24),
        len: 70 + Math.random() * 140,  // 拉长远端射线
        speed: 0.004 + Math.random() * 0.01,
        phase: Math.random() * Math.PI * 2,
        alpha: 0.035 + Math.random() * 0.09
      });
    }

    function rotatePoint(p, rx, ry) {
      let { x, y, z } = p;

      const cy = Math.cos(ry), sy = Math.sin(ry);
      let dx = x * cy - z * sy;
      let dz = x * sy + z * cy;

      const cx = Math.cos(rx), sx = Math.sin(rx);
      let dy = y * cx - dz * sx;
      dz = y * sx + dz * cx;

      return { x: dx, y: dy, z: dz };
    }

    function project(p) {
      const scale = 0.72 + (p.z + R) / (R * 2) * 0.48;
      return {
        x: CX + p.x * scale,
        y: CY + p.y * scale,
        z: p.z,
        scale,
        alpha: 0.18 + (p.z + R) / (R * 2) * 0.85
      };
    }

    function drawRays() {
      for (const r of rays) {
        const pulse = (Math.sin(tick * r.speed + r.phase) + 1) * 0.5;
        const sx = CX + Math.cos(r.angle + rotY * 0.28) * r.radius;
        const sy = CY + Math.sin(r.angle) * r.radius * 0.92;
        const ex = sx + Math.cos(r.angle) * (r.len * pulse);
        const ey = sy + Math.sin(r.angle) * (r.len * pulse);

        const g = ctx.createLinearGradient(sx, sy, ex, ey);
        g.addColorStop(0, `rgba(80,210,255,${r.alpha * pulse})`);
        g.addColorStop(1, "rgba(80,210,255,0)");

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = g;
        ctx.lineWidth = 1.1;
        ctx.stroke();
      }
    }

    function drawOuterScatter() {
      for (const l of outerLines) {
        const p = project(rotatePoint(l, rotX, rotY));
        if (p.y > 392) continue;

        const ex = p.x + Math.cos(l.spread + rotY * 0.7) * l.len;
        const ey = p.y - Math.abs(Math.sin(l.spread)) * l.len;

        const g = ctx.createLinearGradient(p.x, p.y, ex, ey);
        g.addColorStop(0, `rgba(90,220,255,${l.alpha * p.alpha})`);
        g.addColorStop(0.55, `rgba(90,220,255,${l.alpha * 0.45})`);
        g.addColorStop(1, "rgba(90,220,255,0)");

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = g;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(130,240,255,${l.alpha})`;
        ctx.shadowColor = "rgba(130,240,255,0.95)";
        ctx.shadowBlur = 12;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      tick++;

      drawRays();

      const map = new Map();
      const projected = points.map(p => {
        const pp = project(rotatePoint(p, rotX, rotY));
        map.set(p, pp);
        return pp;
      });

      drawOuterScatter();

      for (const [a, b] of links) {
        const pa = map.get(a), pb = map.get(b);
        if (pa.y > 392 || pb.y > 392) continue;

        const dx = pa.x - pb.x;
        const dy = pa.y - pb.y;
        if (dx * dx + dy * dy < 1800) {
          ctx.beginPath();
          ctx.moveTo(pa.x, pa.y);
          ctx.lineTo(pb.x, pb.y);
          ctx.strokeStyle = `rgba(70,180,255,${0.07 * pa.alpha})`;
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }

      projected.sort((a, b) => a.z - b.z);

      for (const p of projected) {
        if (p.y > 392) continue;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 0.6 + p.scale * 1.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(150,235,255,${p.alpha})`;
        ctx.shadowColor = "rgba(100,220,255,0.95)";
        ctx.shadowBlur = 8;
        ctx.fill();
      }

      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(CX, CY, R + 1, Math.PI, Math.PI * 2);
      ctx.strokeStyle = "rgba(100,220,255,0.18)";
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    function animate() {
      rotY += (targetRotY - rotY) * 0.055;
      rotX += (targetRotX - rotX) * 0.055;
      draw();
      requestAnimationFrame(animate);
    }

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left - 200) / 400;
      const my = (e.clientY - rect.top - 200) / 400;

      targetRotY = mx * 1.45;
      targetRotX = my * 0.72;
    });

    canvas.addEventListener("mouseleave", () => {
      targetRotX = 0;
      targetRotY = 0;
    });

    animate();
  </script>
</body>
</html>
