<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Earth 400x400</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tech-earth {
      width: 400px;
      height: 400px;
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    canvas {
      width: 400px;
      height: 400px;
      display: block;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="tech-earth">
    <canvas id="globe" width="400" height="400"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("globe");
    const ctx = canvas.getContext("2d");

    const W = 400;
    const H = 400;
    const CX = 200;
    const CY = 255;
    const R = 128;

    let rotY = 0, rotX = 0;
    let targetRotY = 0, targetRotX = 0;
    let tick = 0;

    const points = [];
    const links = [];
    const outerLines = [];
    const rays = [];

    const POINT_COUNT = 2200;
    const OUTER_LINE_COUNT = 170;
    const RAY_COUNT = 120;

    // 伪大陆分布（用多个高斯区域模拟真实板块）
    const continents = [
      { lon: -105, lat: 45, rx: 38, ry: 24 }, // 北美
      { lon: -65,  lat: -15, rx: 24, ry: 32 }, // 南美
      { lon: 20,   lat: 8, rx: 26, ry: 34 }, // 非洲
      { lon: 18,   lat: 52, rx: 20, ry: 12 }, // 欧洲
      { lon: 88,   lat: 42, rx: 58, ry: 24 }, // 亚洲
      { lon: 135,  lat: -24, rx: 18, ry: 12 }, // 澳大利亚
      { lon: -42,  lat: 72, rx: 12, ry: 8 }   // 格陵兰
    ];

    function toXYZ(lon, lat, radius = R) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lon + 180) * Math.PI / 180;
      return {
        x: -(radius * Math.sin(phi) * Math.cos(theta)),
        y: radius * Math.cos(phi),
        z: radius * Math.sin(phi) * Math.sin(theta)
      };
    }

    function inContinent(lon, lat) {
      for (const c of continents) {
        const dx = (lon - c.lon) / c.rx;
        const dy = (lat - c.lat) / c.ry;
        if ((dx * dx + dy * dy) < 1) return true;
      }
      return false;
    }

    function createGeoPoint() {
      const lon = -180 + Math.random() * 360;
      const lat = -70 + Math.random() * 145;

      const onLand = inContinent(lon, lat);
      const keep = onLand
        ? Math.random() < 0.88   // 大陆高密度
        : Math.random() < 0.16;  // 海洋低密度

      if (!keep) return createGeoPoint();

      return toXYZ(lon, lat);
    }

    for (let i = 0; i < POINT_COUNT; i++) points.push(createGeoPoint());

    for (let i = 0; i < points.length; i += 5) {
      links.push([
        points[i],
        points[(i + Math.floor(Math.random() * 20) + 1) % points.length]
      ]);
    }

    // 更均匀、随机方向的散射线
    for (let i = 0; i < OUTER_LINE_COUNT; i++) {
      const a = Math.random() * Math.PI;
      outerLines.push({
        x: Math.cos(a) * (R * (0.68 + Math.random() * 0.24)),
        y: -Math.sin(a) * (R * (0.2 + Math.random() * 0.78)),
        z: (Math.random() - 0.5) * 80,
        len: 28 + Math.random() * 95,
        angle: Math.random() * Math.PI * 2, // 全方向随机
        alpha: 0.08 + Math.random() * 0.28
      });
    }

    // 更自然的远端射线
    for (let i = 0; i < RAY_COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      rays.push({
        angle,
        radius: R * (0.55 + Math.random() * 0.4),
        len: 35 + Math.random() * 110,
        speed: 0.004 + Math.random() * 0.012,
        phase: Math.random() * Math.PI * 2,
        alpha: 0.025 + Math.random() * 0.08
      });
    }

    function rotatePoint(p, rx, ry) {
      let { x, y, z } = p;

      const cy = Math.cos(ry), sy = Math.sin(ry);
      let dx = x * cy - z * sy;
      let dz = x * sy + z * cy;

      const cx = Math.cos(rx), sx = Math.sin(rx);
      let dy = y * cx - dz * sx;
      dz = y * sx + dz * cx;

      return { x: dx, y: dy, z: dz };
    }

    function project(p) {
      const scale = 0.72 + (p.z + R) / (R * 2) * 0.48;
      return {
        x: CX + p.x * scale,
        y: CY + p.y * scale,
        z: p.z,
        scale,
        alpha: 0.16 + (p.z + R) / (R * 2) * 0.88
      };
    }

    function drawRays() {
      for (const r of rays) {
        const pulse = (Math.sin(tick * r.speed + r.phase) + 1) * 0.5;
        const sx = CX + Math.cos(r.angle + rotY * 0.12) * r.radius;
        const sy = CY + Math.sin(r.angle) * r.radius * 0.65;
        const ex = sx + Math.cos(r.angle) * (r.len * pulse);
        const ey = sy + Math.sin(r.angle) * (r.len * pulse);

        const g = ctx.createLinearGradient(sx, sy, ex, ey);
        g.addColorStop(0, `rgba(80,210,255,${r.alpha * pulse})`);
        g.addColorStop(1, "rgba(80,210,255,0)");

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = g;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    function drawOuterScatter() {
      for (const l of outerLines) {
        const p = project(rotatePoint(l, rotX, rotY));
        if (p.y > 392) continue;

        const ang = l.angle + rotY * 0.2;
        const ex = p.x + Math.cos(ang) * l.len;
        const ey = p.y + Math.sin(ang) * l.len;

        const g = ctx.createLinearGradient(p.x, p.y, ex, ey);
        g.addColorStop(0, `rgba(90,220,255,${l.alpha * p.alpha})`);
        g.addColorStop(0.5, `rgba(90,220,255,${l.alpha * 0.45})`);
        g.addColorStop(1, "rgba(90,220,255,0)");

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = g;
        ctx.lineWidth = 0.9;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(ex, ey, 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(130,240,255,${l.alpha})`;
        ctx.shadowColor = "rgba(130,240,255,0.9)";
        ctx.shadowBlur = 10;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      tick++;

      drawRays();

      const map = new Map();
      const projected = points.map(p => {
        const pp = project(rotatePoint(p, rotX, rotY));
        map.set(p, pp);
        return pp;
      });

      drawOuterScatter();

      for (const [a, b] of links) {
        const pa = map.get(a), pb = map.get(b);
        if (pa.y > 392 || pb.y > 392) continue;

        const dx = pa.x - pb.x;
        const dy = pa.y - pb.y;
        if (dx * dx + dy * dy < 1600) {
          ctx.beginPath();
          ctx.moveTo(pa.x, pa.y);
          ctx.lineTo(pb.x, pb.y);
          ctx.strokeStyle = `rgba(70,180,255,${0.045 * pa.alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }

      projected.sort((a, b) => a.z - b.z);

      for (const p of projected) {
        if (p.y > 392) continue;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 0.55 + p.scale * 1.35, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160,238,255,${p.alpha})`;
        ctx.shadowColor = "rgba(100,220,255,0.95)";
        ctx.shadowBlur = 7;
        ctx.fill();
      }

      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(CX, CY, R + 1, Math.PI, Math.PI * 2);
      ctx.strokeStyle = "rgba(100,220,255,0.16)";
      ctx.lineWidth = 1.1;
      ctx.stroke();
    }

    function animate() {
      rotY += (targetRotY - rotY) * 0.05;
      rotX += (targetRotX - rotX) * 0.05;
      draw();
      requestAnimationFrame(animate);
    }

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left - 200) / 400;
      const my = (e.clientY - rect.top - 200) / 400;

      targetRotY = mx * 1.3;
      targetRotX = my * 0.65;
    });

    canvas.addEventListener("mouseleave", () => {
      targetRotX = 0;
      targetRotY = 0;
    });

    animate();
  </script>
</body>
</html>
